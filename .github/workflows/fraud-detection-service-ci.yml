name: Fraud-Detection-Service-CI

on:
  push:
    paths:
      - 'services/fraud-detection-service/**'
      - 'services/shared/**'
  pull_request:
    paths:
      - 'services/fraud-detection-service/**'
      - 'services/shared/**'
  workflow_dispatch:

jobs:
  build:
    name: "CI - fraud-detection-service"
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: read

    defaults:
      run:
        working-directory: services/fraud-detection-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('services/fraud-detection-service/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # -------- TAGGING STRATEGY ----------------------------------------
      # main branch  → semantic version (vX.Y.Z)  — pushed to registry
      # other branch → sha-XXXXXXX                — built & scanned ONLY, NOT pushed
      # ------------------------------------------------------------------

      - name: Calculate Semantic Version (main only)
        id: semver
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: 'v'

      - name: Resolve Image Tag
        id: image_tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=${{ steps.semver.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "push=true"                               >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=sha-${SHORT_SHA}"                    >> $GITHUB_OUTPUT
            echo "push=false"                              >> $GITHUB_OUTPUT
          fi

      # -------- SETUP NODE ----------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Auto-fix package-lock.json
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            echo "Lockfile was updated by npm install. Committing to repository..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json [skip ci]"
            git push
          else
            echo "Lockfile is fully synced."
          fi

      # -------- TEST ----------------------------------------------------
      - name: Run Tests
        run: npm test

      # -------- SONAR ---------------------------------------------------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ./.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------- SNYK ----------------------------------------------------
      - name: Snyk Scan
        uses: snyk/actions/node@0.4.0
        with:
          command: test
          args: --file=services/fraud-detection-service/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # -------- DOCKER BUILD --------------------------------------------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        working-directory: services
        run: |
          docker build \
            -f fraud-detection-service/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:${{ steps.image_tag.outputs.tag }} \
            .

      # -------- TRIVY (runs BEFORE push — a failure blocks the push) -----
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:${{ steps.image_tag.outputs.tag }}'
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # -------- PUSH (main only, after Trivy passes) --------------------
      - name: Push Docker Image (semver + latest)
        if: steps.image_tag.outputs.push == 'true'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:${{ steps.image_tag.outputs.tag }}
          docker tag  ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:${{ steps.image_tag.outputs.tag }} \
                      ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:latest

      - name: Create Git Tag (main only)
        if: steps.image_tag.outputs.push == 'true'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          custom_tag: ${{ steps.semver.outputs.new_tag }}
          tag_prefix: ''

  create-release:
    name: "Create GitHub Release"
    needs: [build]
    if: always() && github.ref == 'refs/heads/main' && needs.build.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.image_tag }}
          name: Release ${{ needs.build.outputs.image_tag }}
          body: |
            Release of fraud-detection-service
            Version: ${{ needs.build.outputs.image_tag }}
            Image: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:${{ needs.build.outputs.image_tag }}
          generate_release_notes: true

  # ── JOB : NOTIFY ───────────────────────────────────────────────────────────
  notify:
    name: "Notify"
    runs-on: ubuntu-latest
    needs: [build, create-release]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      # -------- EMAIL NOTIFICATION --------------------------------------
      - name: Send Email (Success)
        if: success() && github.ref == 'refs/heads/main'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Success - fraud-detection-service ${{ steps.image_tag.outputs.tag }}"
          body: |
            Build Successful

            Service:      fraud-detection-service
            Tag:          ${{ steps.image_tag.outputs.tag }}
            Image:        ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:${{ steps.image_tag.outputs.tag }}
            Repository:   ${{ github.repository }}
            Workflow:     ${{ github.workflow }}
            Triggered By: ${{ github.actor }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      - name: Send Email (Failure)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Failed - fraud-detection-service - Run #${{ github.run_number }}"
          body: |
            CI Pipeline Execution Failed

            Service:       fraud-detection-service
            Tag Attempted: ${{ steps.image_tag.outputs.tag }}
            Repository:    ${{ github.repository }}
            Workflow:      ${{ github.workflow }}

            Event Type:    ${{ github.event_name }}
            Branch:        ${{ github.ref_name }}
            Triggered By:  ${{ github.actor }}

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
